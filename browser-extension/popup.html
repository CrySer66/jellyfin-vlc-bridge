<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jellyfin VLC Bridge</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <img src="icons/icon48.png" width="48" height="48" alt="">
    <div>
      <h1>Jellyfin VLC Bridge</h1>
      <p id="version"></p>
    </div>
  </header>

  <main>
    <section class="status status--checking" id="status" aria-live="polite">
      <span class="status__dot" aria-hidden="true"></span>
      <div>
        <strong id="status-title"></strong>
        <p id="status-detail"></p>
      </div>
    </section>

    <a class="button button--primary" id="download" href="#"></a>
    <a class="button" id="github" href="#"></a>
    <a class="support" id="support" href="#"></a>
  </main>

  <script src="i18n.js"></script>
  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
