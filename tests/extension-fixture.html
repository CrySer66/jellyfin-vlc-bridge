<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Test visuel Jellyfin VLC Bridge</title>
  <link rel="stylesheet" href="../browser-extension/content.css">
  <style>
    :root { --jf-palette-primary-main: #00a4dc; color-scheme: dark; }
    * { box-sizing: border-box; }
    body { background: radial-gradient(circle at top left, #25313f, #101419 65%); color: #fff; font: 16px system-ui, sans-serif; margin: 0; min-height: 100vh; }
    .detailPagePrimaryContainer { align-items: end; display: flex; min-height: 72vh; padding: 10vw; }
    .details { max-width: 54rem; }
    h1 { font-size: clamp(2.6rem, 7vw, 5.4rem); margin: 0 0 .35em; }
    p { color: #d7dce2; line-height: 1.5; max-width: 42rem; }
    .mainDetailButtons { align-items: center; display: flex; flex-wrap: wrap; gap: .35rem; margin-top: 1.5rem; }
    .emby-button { background: #fff; border: 0; border-radius: .45em; color: #111; cursor: pointer; font: inherit; padding: .68em 1.15em; }
  </style>
</head>
<body>
  <main class="detailPagePrimaryContainer">
    <section class="details">
      <h1>Film de démonstration</h1>
      <p>Cette page reproduit uniquement la zone d’actions nécessaire au test visuel de l’extension.</p>
      <div class="mainDetailButtons">
        <button class="emby-button btnPlay" type="button">▶ Lire</button>
        <button class="emby-button" type="button">＋ Ma liste</button>
      </div>
    </section>
  </main>
  <script>
    globalThis.chrome = {
      runtime: {
        id: 'fixture-extension',
        lastError: null,
        sendMessage(message, callback) {
          if (message.type === 'status') callback({ ok: !location.search.includes('missing=true') });
          else if (message.type === 'preferences-get') callback({
            ok: true,
            preferences: {
              rememberChoices: location.search.includes('remember=true'),
              startMode: 'restart',
              scopes: { series: 'all' }
            }
          });
          else if (message.type === 'preferences-save') callback({ ok: true });
          else if (message.type === 'inspect') callback({
            ok: true,
            inspection: {
              itemType: new URLSearchParams(location.search).get('type') || 'Series',
              title: 'Série de démonstration',
              scope: message.scope,
              totalCount: message.scope === 'single' ? 1 : 4,
              totalDurationSeconds: message.scope === 'single' ? 2580 : 10320,
              hasResume: true,
              resumeSeconds: 1320,
              items: [
                { label: 'S01E02 — Le deuxième épisode', resumeSeconds: 1320 },
                { label: 'S01E03 — La suite', resumeSeconds: 0 },
                { label: 'S01E04 — Le tournant', resumeSeconds: 0 },
                { label: 'S01E05 — La conclusion', resumeSeconds: 0 }
              ].slice(0, message.scope === 'single' ? 1 : 4)
            }
          });
          else callback?.({ ok: true });
        }
      }
    };
  </script>
  <script src="../browser-extension/shared.js"></script>
  <script src="../browser-extension/content.js"></script>
</body>
</html>
